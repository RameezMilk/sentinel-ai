<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SentinelAI — Blockchain Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

<style>
/* ── Reset & base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0b0b14;
  --surface:   #11111e;
  --surface2:  #18182a;
  --border:    #1f1f38;
  --purple:    #9945ff;
  --purple-dim:#5c2b99;
  --cyan:      #14f195;
  --red:       #ff4560;
  --green:     #14f195;
  --text:      #ddddf5;
  --muted:     #6b6b9a;
  --font:      'Courier New', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  overflow: hidden;
}

/* ── Header ───────────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  height: 48px;
}

header h1 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--purple);
}

header h1 span { color: var(--cyan); }

#status-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 11px;
  color: var(--muted);
}

#status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted);
  display: inline-block;
}
#status-dot.live { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
#status-dot.error { background: var(--red); }

/* ── Main grid ────────────────────────────────────────────────────────── */
main {
  display: grid;
  grid-template-columns: 1fr 1.15fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
  padding: 12px;
  height: calc(100vh - 48px);
}

/* ── Cards ────────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.card-blockchain { grid-row: 1 / 3; }
.card-pie        { grid-row: 1 / 3; }
.card-line       { grid-row: 1; }
.card-bar        { grid-row: 2; }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  flex-shrink: 0;
}

.card-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--purple);
}

.card-meta {
  font-size: 10px;
  color: var(--muted);
}

.card-body {
  flex: 1;
  overflow: hidden;
  position: relative;
  padding: 10px;
}

/* ── Loading / empty states ───────────────────────────────────────────── */
.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 8px;
  color: var(--muted);
  font-size: 11px;
}

.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Blockchain chain ─────────────────────────────────────────────────── */
#chain-container {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 4px 6px 4px 14px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#chain-container::-webkit-scrollbar { width: 4px; }
#chain-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.chain-list {
  position: relative;
  padding-left: 20px;
  list-style: none;
}

/* vertical spine */
.chain-list::before {
  content: '';
  position: absolute;
  left: 8px; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, var(--purple) 0%, var(--purple-dim) 60%, transparent 100%);
}

.block-item {
  position: relative;
  margin-bottom: 10px;
  cursor: pointer;
}

/* connector dot */
.block-item::before {
  content: '';
  position: absolute;
  left: -20px; top: 50%;
  transform: translateY(-50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid var(--purple);
  background: var(--bg);
  z-index: 1;
}

.block-item:first-child::before {
  background: var(--purple);
  box-shadow: 0 0 8px var(--purple);
}

.block-tile {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 7px 10px;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}

.block-item:first-child .block-tile {
  border-color: var(--purple-dim);
}

.block-tile:hover {
  border-color: var(--purple);
  background: #1c1c32;
}

.block-sig {
  font-size: 11px;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.block-meta-row {
  display: flex;
  justify-content: space-between;
  margin-top: 3px;
  font-size: 10px;
  color: var(--muted);
}

.block-type {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 700;
}

.type-risk    { background: rgba(255,69,96,0.2);  color: var(--red); }
.type-prompt  { background: rgba(153,69,255,0.2); color: var(--purple); }
.type-unknown { background: rgba(107,107,154,0.15); color: var(--muted); }
.type-error   { background: rgba(255,69,96,0.1);  color: #884455; }

/* ── Tooltip ──────────────────────────────────────────────────────────── */
#tooltip {
  position: fixed;
  z-index: 9999;
  background: #0d0d1c;
  border: 1px solid var(--purple);
  border-radius: 5px;
  padding: 10px 12px;
  max-width: 380px;
  max-height: 300px;
  overflow: auto;
  font-size: 10px;
  line-height: 1.5;
  color: var(--text);
  pointer-events: none;
  display: none;
  white-space: pre;
  box-shadow: 0 4px 24px rgba(153,69,255,0.3);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

#tooltip .tt-key   { color: var(--cyan); }
#tooltip .tt-str   { color: #e8b86d; }
#tooltip .tt-num   { color: #7ec8e3; }
#tooltip .tt-bool  { color: var(--purple); }
#tooltip .tt-null  { color: var(--muted); }

/* ── Chart canvases ───────────────────────────────────────────────────── */
.chart-wrap {
  position: relative;
  width: 100%;
  height: 100%;
}

canvas { display: block; }

/* ── Pie legend ───────────────────────────────────────────────────────── */
#pie-legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 6px 0 2px;
  font-size: 11px;
  flex-shrink: 0;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Refresh countdown ────────────────────────────────────────────────── */
#countdown {
  font-size: 10px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}
</style>
</head>
<body>

<header>
  <h1>Sentinel<span>AI</span> &mdash; Blockchain Analytics</h1>
  <div id="status-bar">
    <span id="status-dot"></span>
    <span id="status-text">Connecting…</span>
    <span id="countdown"></span>
  </div>
</header>

<main>

  <!-- ── Card 1: Blockchain blocks ──────────────────────────────────── -->
  <div class="card card-blockchain">
    <div class="card-header">
      <span class="card-title">Solana Chain</span>
      <span class="card-meta" id="chain-meta">—</span>
    </div>
    <div class="card-body" style="padding:0;">
      <div id="chain-container">
        <div class="placeholder"><div class="spinner"></div><span>Loading blocks…</span></div>
      </div>
    </div>
  </div>

  <!-- ── Card 2: Pie chart ───────────────────────────────────────────── -->
  <div class="card card-pie">
    <div class="card-header">
      <span class="card-title">Risk Acceptance</span>
      <span class="card-meta" id="pie-meta">—</span>
    </div>
    <div class="card-body" style="display:flex;flex-direction:column;">
      <div id="pie-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--red)"></div>
          <span>Accepted (risky)</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--green)"></div>
          <span>Rejected (safe)</span>
        </div>
      </div>
      <div class="chart-wrap" style="flex:1;">
        <canvas id="pieCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- ── Card 3: Line chart ─────────────────────────────────────────── -->
  <div class="card card-line">
    <div class="card-header">
      <span class="card-title">Risks Over Time</span>
      <span class="card-meta" id="line-meta">per day</span>
    </div>
    <div class="card-body">
      <div class="chart-wrap">
        <canvas id="lineCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- ── Card 4: Bar chart ──────────────────────────────────────────── -->
  <div class="card card-bar">
    <div class="card-header">
      <span class="card-title">Risks by Source</span>
      <span class="card-meta" id="bar-meta">policy file / scanner</span>
    </div>
    <div class="card-body">
      <div class="chart-wrap">
        <canvas id="barCanvas"></canvas>
      </div>
    </div>
  </div>

</main>

<!-- Floating JSON tooltip -->
<div id="tooltip"></div>

<script>
// ── Chart.js global defaults ─────────────────────────────────────────────
Chart.defaults.color = '#6b6b9a';
Chart.defaults.font.family = "'Courier New', monospace";
Chart.defaults.font.size = 11;
Chart.register(ChartDataLabels);

const PURPLE  = '#9945ff';
const RED     = '#ff4560';
const GREEN   = '#14f195';
const GRID    = '#1f1f38';
const SURFACE = '#18182a';

// ── Tooltip helpers ──────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function syntaxHighlight(obj) {
  const json = JSON.stringify(obj, null, 2);
  return json.replace(
    /("(\\u[\dA-Fa-f]{4}|\\[^u]|[^\\"])*"(?:\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    match => {
      if (/^"/.test(match)) {
        return /:$/.test(match)
          ? `<span class="tt-key">${match}</span>`
          : `<span class="tt-str">${match}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="tt-bool">${match}</span>`;
      if (/null/.test(match))       return `<span class="tt-null">${match}</span>`;
      return `<span class="tt-num">${match}</span>`;
    }
  );
}

function showTooltip(evt, obj) {
  if (!obj) { hideTooltip(); return; }
  tooltip.innerHTML = syntaxHighlight(obj);
  tooltip.style.display = 'block';
  positionTooltip(evt);
}

function positionTooltip(evt) {
  const pad = 14;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  let x = evt.clientX + pad, y = evt.clientY + pad;
  if (x + tw > window.innerWidth  - pad) x = evt.clientX - tw - pad;
  if (y + th > window.innerHeight - pad) y = evt.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

document.addEventListener('mousemove', evt => {
  if (tooltip.style.display === 'block') positionTooltip(evt);
});

// ── Blockchain chain render ───────────────────────────────────────────────
function sigLabel(sig) {
  if (!sig || sig.length < 20) return sig || '???';
  return sig.slice(0, 8) + '…' + sig.slice(-8);
}

function blockTypeClass(memo) {
  if (!memo) return 'type-unknown';
  const t = memo.t;
  if (t === 'risk')   return 'type-risk';
  if (t === 'prompt') return 'type-prompt';
  return 'type-unknown';
}

function blockTypeLabel(memo) {
  if (!memo) return 'unknown';
  return memo.t || 'event';
}

function renderChain(blocks) {
  const container = document.getElementById('chain-container');
  const promptCount = blocks.filter(b => b.memo?.t === 'prompt').length;
  const riskCount   = blocks.filter(b => b.memo?.t === 'risk').length;
  document.getElementById('chain-meta').textContent = blocks.length
    ? `${promptCount} prompt · ${riskCount} risk`
    : 'no data';

  if (!blocks.length) {
    container.innerHTML =
      '<div class="placeholder"><span>No transactions found</span></div>';
    return;
  }

  const ul = document.createElement('ul');
  ul.className = 'chain-list';

  blocks.forEach((b, idx) => {
    const li   = document.createElement('li');
    li.className = 'block-item';

    const typeClass = b.err ? 'type-error' : blockTypeClass(b.memo);
    const typeLabel = b.err ? 'error'      : blockTypeLabel(b.memo);

    const dateStr = b.timestamp
      ? new Date(b.timestamp).toLocaleString(undefined, {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          hour12: false,
        })
      : 'unknown time';

    li.innerHTML = `
      <div class="block-tile">
        <div class="block-sig">${sigLabel(b.signature)}</div>
        <div class="block-meta-row">
          <span>${dateStr}</span>
          <span class="block-type ${typeClass}">${typeLabel}</span>
        </div>
      </div>`;

    const tile = li.querySelector('.block-tile');

    tile.addEventListener('mouseenter', evt => {
      const data = b.memo
        ? { ...b.memo, _slot: b.slot, _sig: b.signature }
        : { _slot: b.slot, _sig: b.signature, _err: b.err };
      showTooltip(evt, data);
    });
    tile.addEventListener('mouseleave', hideTooltip);

    ul.appendChild(li);
  });

  container.innerHTML = '';
  container.appendChild(ul);
}

// ── Charts ────────────────────────────────────────────────────────────────
let pieChart  = null;
let lineChart = null;
let barChart  = null;

const CHART_DEFAULTS = {
  animation: { duration: 400 },
};

function buildPie(data) {
  const { accepted, unaccepted, total } = data;
  const ctx = document.getElementById('pieCanvas').getContext('2d');

  if (pieChart) pieChart.destroy();

  document.getElementById('pie-meta').textContent =
    total ? `${total} risks total` : 'no data';

  if (!total) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    pieChart = null;
    return;
  }

  pieChart = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: ['Accepted', 'Rejected'],
      datasets: [{
        data: [accepted, unaccepted],
        backgroundColor: [RED, GREEN],
        borderColor: ['#0b0b14'],
        borderWidth: 3,
        hoverBorderWidth: 3,
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: 20 },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const pct = total ? ((ctx.parsed / total) * 100).toFixed(1) : 0;
              return ` ${ctx.label}: ${ctx.parsed}  (${pct}%)`;
            },
          },
        },
        datalabels: {
          color: '#fff',
          font: { size: 14, weight: 'bold', family: "'Courier New', monospace" },
          formatter: (val) => {
            if (!total || val === 0) return '';
            return ((val / total) * 100).toFixed(1) + '%';
          },
        },
      },
    },
  });
}

function buildLine(data) {
  const { dates, counts } = data;
  const ctx = document.getElementById('lineCanvas').getContext('2d');

  if (lineChart) lineChart.destroy();

  document.getElementById('line-meta').textContent =
    dates.length ? `${dates.length} days` : 'no data';

  if (!dates.length) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    lineChart = null;
    return;
  }

  const gradient = ctx.createLinearGradient(0, 0, 0, 200);
  gradient.addColorStop(0, 'rgba(153,69,255,0.35)');
  gradient.addColorStop(1, 'rgba(153,69,255,0.0)');

  lineChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates,
      datasets: [{
        label: 'Risks',
        data: counts,
        borderColor: PURPLE,
        borderWidth: 2,
        pointBackgroundColor: PURPLE,
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.3,
        fill: true,
        backgroundColor: gradient,
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        datalabels: { display: false },
      },
      scales: {
        x: {
          grid: { color: GRID },
          ticks: { maxRotation: 35, maxTicksLimit: 8 },
        },
        y: {
          grid: { color: GRID },
          beginAtZero: true,
          ticks: {
            stepSize: 1,
            callback: v => (Number.isInteger(v) ? v : ''),
          },
        },
      },
    },
  });
}

function buildBar(data) {
  const { sources, counts } = data;
  const ctx = document.getElementById('barCanvas').getContext('2d');

  if (barChart) barChart.destroy();

  document.getElementById('bar-meta').textContent =
    sources.length ? `${sources.length} sources` : 'no data';

  if (!sources.length) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    barChart = null;
    return;
  }

  // colour each bar by source type
  const colours = sources.map(s => {
    if (s === 'regex')               return '#7ec8e3';  // cyan-ish
    if (s.toLowerCase().includes('risk'))        return RED;
    if (s.toLowerCase().includes('injection'))   return '#ff9f40';
    if (s.toLowerCase().includes('secret'))      return '#ffcd56';
    if (s.toLowerCase().includes('crypto'))      return '#a3e635';
    if (s.toLowerCase().includes('supply'))      return '#fb923c';
    if (s.toLowerCase().includes('data'))        return '#818cf8';
    return PURPLE;
  });

  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sources,
      datasets: [{
        label: 'Count',
        data: counts,
        backgroundColor: colours,
        borderRadius: 3,
        borderSkipped: false,
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: 'end',
          align: 'top',
          color: '#ddddf5',
          font: { size: 10, weight: 'bold' },
          formatter: v => v,
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            maxRotation: 30,
            callback(val) {
              const lbl = this.getLabelForValue(val);
              return lbl.length > 14 ? lbl.slice(0, 12) + '…' : lbl;
            },
          },
        },
        y: {
          grid: { color: GRID },
          beginAtZero: true,
          ticks: {
            stepSize: 1,
            callback: v => (Number.isInteger(v) ? v : ''),
          },
        },
      },
    },
  });
}

// ── Status indicator ─────────────────────────────────────────────────────
const dot      = document.getElementById('status-dot');
const statusTx = document.getElementById('status-text');

function setStatus(state, text) {
  dot.className = '';
  if (state === 'live')  { dot.classList.add('live');  }
  if (state === 'error') { dot.classList.add('error'); }
  statusTx.textContent = text;
}

// ── Data fetching ────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function refresh() {
  try {
    setStatus('', 'Fetching…');

    const [chain, analytics] = await Promise.all([
      fetchJSON('/api/blockchain'),
      fetchJSON('/api/analytics'),
    ]);

    renderChain(chain.blocks || []);
    buildPie(analytics.pie);
    buildLine(analytics.line);
    buildBar(analytics.bar);

    const pubkey = chain.public_key;
    const shortKey = pubkey
      ? pubkey.slice(0, 6) + '…' + pubkey.slice(-6)
      : 'no keypair';

    setStatus('live', `Live — ${shortKey}`);
  } catch (err) {
    console.error(err);
    setStatus('error', `Error: ${err.message}`);
  }
}

// ── Countdown & auto-refresh ─────────────────────────────────────────────
const REFRESH_INTERVAL = 30; // seconds
let countdown = REFRESH_INTERVAL;
const countdownEl = document.getElementById('countdown');

function tick() {
  countdown--;
  countdownEl.textContent = `refresh in ${countdown}s`;
  if (countdown <= 0) {
    countdown = REFRESH_INTERVAL;
    refresh();
  }
}

refresh();
setInterval(tick, 1000);
</script>
</body>
</html>
